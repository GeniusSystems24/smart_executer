name: smart_executer
description: A powerful Flutter package for executing async operations with built-in error handling, loading dialogs, retry logic, and Result pattern support.
version: 1.3.0+2
homepage: https://github.com/GeniusSystems24/smart_executer
repository: https://github.com/GeniusSystems24/smart_executer
issue_tracker: https://github.com/GeniusSystems24/smart_executer/issues
documentation: https://pub.dev/documentation/smart_executer/latest/

topics:
  - async
  - error-handling
  - loading
  - network
  - dio

# screenshots:
#   - description: 'Smart Executer loading dialog example'
#     path: screenshots/loading_dialog.png

environment:
  sdk: ^3.0.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.0.0
  dio: ^5.4.0
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0

flutter:
  # This section is intentionally left empty.
  # The package does not include any assets or fonts.
