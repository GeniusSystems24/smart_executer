<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Smart Executer - Professional Async Operation Management">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0F172A">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Executer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Smart Executer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #0F172A;
      --bg-light: #1E293B;
      --accent: #667EEA;
      --accent-glow: rgba(102, 126, 234, 0.3);
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
    }

    /* ========== CANVAS BACKGROUND ========== */
    #network-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      transition: opacity 0.8s ease-out;
    }

    /* ========== CONTENT WRAPPER ========== */
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      background: radial-gradient(circle at center, transparent 0%, var(--bg-dark) 100%);
      transition: opacity 0.8s ease-out;
    }

    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ========== LOGO SECTION ========== */
    .logo-container {
      position: relative;
      margin-bottom: 40px;
      width: 80px;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      border-radius: 20px;
      opacity: 0.1;
      transform: rotate(45deg);
      animation: breathe 4s ease-in-out infinite;
    }

    .logo-border {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      transform: rotate(45deg);
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      fill: var(--text-main);
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }

    @keyframes breathe {

      0%,
      100% {
        transform: rotate(45deg) scale(1);
        opacity: 0.1;
      }

      50% {
        transform: rotate(45deg) scale(1.1);
        opacity: 0.2;
      }
    }

    /* ========== TYPOGRAPHY ========== */
    .app-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
      background: linear-gradient(to right, #fff, #94A3B8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      opacity: 0;
      animation: fade-up 0.8s ease-out 0.2s forwards;
    }

    .app-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 400;
      margin-bottom: 48px;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fade-up 0.8s ease-out 0.4s forwards;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== LOADER ========== */
    .loader-wrapper {
      position: relative;
      width: 240px;
      opacity: 0;
      animation: fade-in 1s ease-out 0.6s forwards;
    }

    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-line {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: loading-scan 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .loading-status {
      margin-top: 16px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      font-weight: 500;
    }

    @keyframes loading-scan {
      0% {
        left: -30%;
      }

      50% {
        left: 100%;
      }

      100% {
        left: 100%;
      }
    }

    @keyframes fade-in {
      to {
        opacity: 1;
      }
    }

    /* ========== FOOTER ========== */
    .footer {
      position: fixed;
      bottom: 32px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <!-- Network Background -->
  <canvas id="network-canvas"></canvas>

  <div id="splash-screen">
    <!-- Sophisticated Logo -->
    <div class="logo-container">
      <div class="logo-bg"></div>
      <div class="logo-border"></div>
      <svg class="logo-icon" viewBox="0 0 24 24">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
      </svg>
    </div>

    <h1 class="app-title">Smart Executer</h1>
    <p class="app-subtitle">Robust Asynchronous Operations Framework</p>

    <!-- Minimalist Loader -->
    <div class="loader-wrapper">
      <div class="progress-track">
        <div class="progress-line"></div>
      </div>
      <div class="loading-status" id="status-text">INITIALIZING CORE SYSTEM</div>
    </div>

    <div class="footer">v1.3.0 • GENIUS SYSTEMS</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // ========== NETWORK ANIMATION SYSTEM ==========
    const canvas = document.getElementById('network-canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let particles = [];

    // Configuration
    const particleCount = 60; // Fewer particles for cleaner look
    const connectionDistance = 180;
    const moveSpeed = 0.4;

    // Mouse interaction
    let mouse = { x: null, y: null };

    window.addEventListener('mousemove', (e) => {
      mouse.x = e.x;
      mouse.y = e.y;
    });

    window.addEventListener('resize', resize);

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      initParticles();
    }

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * moveSpeed;
        this.vy = (Math.random() - 0.5) * moveSpeed;
        this.size = Math.random() * 2 + 1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        // Bounce off edges
        if (this.x < 0 || this.x > width) this.vx *= -1;
        if (this.y < 0 || this.y > height) this.vy *= -1;

        // Gentle mouse attraction (Gravity)
        if (mouse.x != null) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          const maxDist = 300;

          if (distance < maxDist) {
            const forceDirectionX = dx / distance;
            const forceDirectionY = dy / distance;
            const force = (maxDist - distance) / maxDist;
            const directionX = forceDirectionX * force * 0.05;
            const directionY = forceDirectionY * force * 0.05;

            this.vx += directionX;
            this.vy += directionY;
          }
        }

        // Friction to prevent continuous acceleration
        const maxSpeed = 1.5;
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (speed > maxSpeed) {
          this.vx = (this.vx / speed) * maxSpeed;
          this.vy = (this.vy / speed) * maxSpeed;
        }

      }

      draw() {
        ctx.fillStyle = 'rgba(148, 163, 184, 0.4)'; // Muted blue-grey
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      // Update and draw connectivity
      for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();

        // Check connections
        for (let j = i; j < particles.length; j++) {
          let dx = particles[i].x - particles[j].x;
          let dy = particles[i].y - particles[j].y;
          let distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < connectionDistance) {
            ctx.beginPath();
            let opacity = 1 - (distance / connectionDistance);
            ctx.strokeStyle = `rgba(102, 126, 234, ${opacity * 0.15})`; // Very subtle purple-blue lines
            ctx.lineWidth = 1;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(animate);
    }

    // Initialize Canvas
    resize();
    animate();

    // ========== STATUS TEXT UPDATER ==========
    const statuses = [
      "INITIALIZING CORE SYSTEM...",
      "VERIFYING DEPENDENCIES...",
      "OPTIMIZING EXECUTION ROUTES...",
      "ESTABLISHING SECURE CONNECTION...",
      "PREPARING INTERFACE..."
    ];
    let statusIndex = 0;

    setInterval(() => {
      statusIndex = (statusIndex + 1) % statuses.length;
      const el = document.getElementById('status-text');
      if (el) {
        el.style.opacity = '0.5';
        setTimeout(() => {
          el.innerText = statuses[statusIndex];
          el.style.opacity = '1';
        }, 200);
      }
    }, 2500);

    // ========== FLUTTER HANDLER ==========
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('splash-screen');
      const canvas = document.getElementById('network-canvas');

      if (splash) {
        splash.classList.add('hidden');
        if (canvas) canvas.style.opacity = '0'; // Fade out network

        setTimeout(() => {
          splash.remove();
          if (canvas) canvas.remove(); // Stop all physics/interactions
        }, 800);
      }
    });

    // Fallback
    setTimeout(function () {
      const splash = document.getElementById('splash-screen');
      const canvas = document.getElementById('network-canvas');
      if (splash && !splash.classList.contains('hidden')) {
        splash.classList.add('hidden');
        if (canvas) canvas.style.opacity = '0';

        setTimeout(() => {
          splash.remove();
          if (canvas) canvas.remove();
        }, 800);
      }
    }, 15000);
  </script>
</body>

</html>
